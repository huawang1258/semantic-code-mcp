name: Release

on:
  push:
    tags: ["v*"]

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag == pyproject == npm package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          NPM=$(node -p "require('./npm/package.json').version")
          echo "tag=$TAG pyproject=$PY npm=$NPM"
          [ "$TAG" = "$PY" ] && [ "$TAG" = "$NPM" ] || { echo "::error::version mismatch"; exit 1; }

  pypi:
    needs: check-versions
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  npm:
    needs: check-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
