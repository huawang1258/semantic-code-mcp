name: Release

on:
  push:
    tags: ["v*"]

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag == pyproject == npm package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          NPM=$(node -p "require('./npm/package.json').version")
          echo "tag=$TAG pyproject=$PY npm=$NPM"
          [ "$TAG" = "$PY" ] && [ "$TAG" = "$NPM" ] || { echo "::error::version mismatch"; exit 1; }

  pypi:
    needs: check-versions
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests before publish (发布门禁)
        env:
          VOYAGE_API_KEY: dummy-ci
          PYTHONUTF8: "1"
        run: |
          pip install -e .
          python test_basic.py
          python test_fixes.py
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  # npm 包（semcode-mcp 薄壳）从本机发布：cd npm && npm publish --access public
  # （维护者本机已有 npm 凭证；如需 CI 发布，加 NPM_TOKEN secret 并恢复 npm job）
