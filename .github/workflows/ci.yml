name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run regression tests (no real API calls)
        env:
          VOYAGE_API_KEY: dummy-ci
          PYTHONUTF8: "1"  # Windows runner 默认 cp1252，中文输出会 UnicodeEncodeError
        run: python test_fixes.py
